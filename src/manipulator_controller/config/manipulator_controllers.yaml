# This file is loaded ONLY by the spawner via --param-file flag.
# It contains per-controller parameters that are pushed to each controller
# via set_parameters service call BEFORE configure() is called.
# Do NOT put controller_manager block here — it belongs in controller_manager.yaml.

arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
    command_interfaces:
      - position
    state_interfaces:
      - position
    open_loop_control: true
    allow_integration_in_goal_trajectories: true

gripper_controller:
  ros__parameters:
    joints:
      - joint_4
    command_interfaces:
      - position
    state_interfaces:
      - position
    open_loop_control: true
    allow_integration_in_goal_trajectories: true